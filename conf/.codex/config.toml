# Codex configuration based on conf/.claude/settings.json
# Only keys supported by Codex CLI are included.

model = "gpt-5.5"
model_provider = "openai"
model_reasoning_effort = "medium"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
service_tier = "fast"
# ~が展開されないため、絶対パスを使用
notify = ["/Users/happy/src/github.com/happy663/dotfiles/conf/.codex/codex-notify"]

[sandbox_workspace_write]
network_access = true

[shell_environment_policy]
inherit = "all"
ignore_default_excludes = true
exclude = []
include_only = []
set = { BASH_DEFAULT_TIMEOUT_MS = "9600000", BASH_MAX_TIMEOUT_MS = "9600000" }

[tui]
notifications = true
animations = true
show_tooltips = true
status_line = ["model-with-reasoning", "context-remaining", "current-dir", "context-used", "five-hour-limit", "weekly-limit"]

[tui.model_availability_nux]
"gpt-5.5" = 4
# notification_method = "auto"


[projects."/Users/happy/src/github.com/happy663/dotfiles"]
trust_level = "trusted"

[projects."/Users/happy/src/github.com"]
trust_level = "trusted"

[projects."/Users/happy/Documents/Playground"]
trust_level = "trusted"

[notice.model_migrations]
"gpt-5.2-codex" = "gpt-5.3-codex"
"gpt-5.3-codex" = "gpt-5.4"

