# =============================================================================
# WezTerm Complete Replication Configuration for tmux
# =============================================================================


# 拡張キーサポート (Ctrl+Tab等のモダンなキーコンビネーション)
set -g extended-keys on

# 全デフォルトキーバインドを削除（全キーテーブル）
# unbind-key -a -T root
# unbind-key -a -T prefix
# unbind-key -a -T copy-mode
# unbind-key -a -T copy-mode-vi
# unbind-key -a

set -g mouse on

# マウスバインド（unbind-key -a で削除されたデフォルトを再定義）
# bind -T root MouseDrag1Border resize-pane -M
# bind -T root MouseDown1Pane select-pane -t = \; send-keys -M
# bind -T root MouseDrag1Pane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -M }
# bind -T root WheelUpPane if-shell -F "#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -e }

# 基本設定
set -g default-terminal "screen-256color"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
setw -g mode-keys vi

# プレフィックスキー設定
set -g prefix C-q
bind C-q send-prefix

# ============================================================================= ウィンドウ（タブ）管理 - WezTerm互換
# =============================================================================
bind t new-window -c "#{pane_current_path}"
bind w kill-window

# Alt+h/l でウィンドウ移動
bind -n M-h previous-window
bind -n M-l next-window

# 代替キーバインド（ターミナル互換性のため）
bind -n C-M-h previous-window
bind -n C-M-l next-window

# プレフィックス付きの代替（確実に動作）
bind p previous-window
bind n next-window

# 数字キーでウィンドウ選択（WezTerm風）
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# =============================================================================
# ペイン管理 - WezTerm互換
# =============================================================================
bind d split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind x confirm-before -p "kill-pane #P? (y/n)" kill-pane

# ペイン移動 - vim風
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# リサイズモード
bind e switch-client -T resize
bind -T resize h resize-pane -L 1 \; switch-client -T resize
bind -T resize j resize-pane -D 1 \; switch-client -T resize
bind -T resize k resize-pane -U 1 \; switch-client -T resize
bind -T resize l resize-pane -R 1 \; switch-client -T resize
bind -T resize Enter switch-client -T root
bind -T resize Escape switch-client -T root

# =============================================================================
# セッション（ワークスペース）管理 - WezTerm互換
# =============================================================================
bind s choose-tree -s
bind '$' command-prompt -I "#S" "rename-session -- '%%'"
bind S command-prompt -p "New session name: " "new-session -d -s '%%'"

# Alt+j/k でセッション間移動（作成順）
bind -n M-j run-shell "~/.config/tmux/switch-session.sh next"
bind -n M-k run-shell "~/.config/tmux/switch-session.sh prev"

# =============================================================================
# コピーモード - WezTerm完全互換
# =============================================================================
bind '[' copy-mode

# 基本移動
bind -T copy-mode-vi h send-keys -X cursor-left
bind -T copy-mode-vi j send-keys -X cursor-down
bind -T copy-mode-vi k send-keys -X cursor-up
bind -T copy-mode-vi l send-keys -X cursor-right

# 行移動
bind -T copy-mode-vi '^' send-keys -X start-of-line
bind -T copy-mode-vi '$' send-keys -X end-of-line
bind -T copy-mode-vi '0' send-keys -X back-to-indentation

# 単語移動
bind -T copy-mode-vi w send-keys -X next-word
bind -T copy-mode-vi b send-keys -X previous-word
bind -T copy-mode-vi e send-keys -X next-word-end

# 文字ジャンプ
bind -T copy-mode-vi f command-prompt -1 -p "jump forward" "send -X jump-forward '%%'"
bind -T copy-mode-vi F command-prompt -1 -p "jump backward" "send -X jump-backward '%%'"
bind -T copy-mode-vi t command-prompt -1 -p "jump to forward" "send -X jump-to-forward '%%'"
bind -T copy-mode-vi T command-prompt -1 -p "jump to backward" "send -X jump-to-backward '%%'"
bind -T copy-mode-vi ';' send-keys -X jump-again
bind -T copy-mode-vi ',' send-keys -X jump-reverse

# ページ移動
bind -T copy-mode-vi C-f send-keys -X page-down
bind -T copy-mode-vi C-b send-keys -X page-up
bind -T copy-mode-vi C-d send-keys -X halfpage-down
bind -T copy-mode-vi C-u send-keys -X halfpage-up

# スクロール位置
bind -T copy-mode-vi g send-keys -X history-top
bind -T copy-mode-vi G send-keys -X history-bottom
bind -T copy-mode-vi H send-keys -X top-line
bind -T copy-mode-vi M send-keys -X middle-line
bind -T copy-mode-vi L send-keys -X bottom-line

# 選択モード
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# コピーと終了
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi q send-keys -X cancel
bind -T copy-mode-vi C-c send-keys -X cancel

# その他の移動
bind -T copy-mode-vi o send-keys -X other-end

# =============================================================================
# 自動リネーム設定 - WezTerm互換
# =============================================================================
set -g automatic-rename on
set -g automatic-rename-format "#{?#{==:#{pane_current_path},#{HOME}},~,#{b:pane_current_path}}"

# =============================================================================
# 外観設定 - Tokyo Nightテーマ
# =============================================================================
set -g status-position top
set -g status-justify left
set -g status-style "bg=#1a1b26,fg=#c0caf5"

# ウィンドウリスト設定
set -g window-status-format "#[bg=#16161e,fg=#c0caf5] #{?#{==:#{@agent-status},running},#[fg=#9ece6a]● ,#{?#{==:#{@agent-status},waiting},#[fg=#e0af68]◐ ,#{?#{==:#{@agent-status},done},#[fg=#7aa2f7]✓ ,#{?#{==:#{@agent-status},error},#[fg=#f7768e]✕ ,}}}}#[fg=#c0caf5]#I: #W "
set -g window-status-current-format "#[bg=#7aa2f7,fg=#1a1b26,bold] #{?#{==:#{@agent-status},running},#[fg=#9ece6a]● ,#{?#{==:#{@agent-status},waiting},#[fg=#e0af68]◐ ,#{?#{==:#{@agent-status},done},#[fg=#c0caf5]✓ ,#{?#{==:#{@agent-status},error},#[fg=#f7768e]✕ ,}}}}#[fg=#1a1b26]#I: #W "
set -g window-status-style "fg=#c0caf5"
set -g window-status-current-style "fg=#1a1b26,bold"
set -g window-status-separator ""

# ペインボーダー
set -g pane-border-style "fg=#565f89"
# 青色
set -g pane-active-border-style "fg=#7aa2f7,bold"
# 赤色
set -g pane-active-border-style "fg=#f7768e,bold"                                 
set -g pane-border-lines heavy

# ペインボーダーにアクティブ表示（ペインが2つ以上の時のみ表示）
set -g pane-border-status off
set -g pane-border-format ""
set-hook -g after-split-window  'if -F "#{==:#{window_panes},1}" "set -w pane-border-status off" "set -w pane-border-status top"'
set-hook -g after-kill-pane     'if -F "#{==:#{window_panes},1}" "set -w pane-border-status off" "set -w pane-border-status top"'
set-hook -g pane-exited         'if -F "#{==:#{window_panes},1}" "set -w pane-border-status off" "set -w pane-border-status top"'
set-hook -g window-layout-changed 'if -F "#{==:#{window_panes},1}" "set -w pane-border-status off" "set -w pane-border-status top"'

# ステータスバー表示
set -g status-left-length 90
set -g status-right-length 90
set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[bg=#1a1b26,fg=#7aa2f7]"
set -g status-right ""
set -g status-interval 1

# メッセージ設定
set -g message-style "bg=#7aa2f7,fg=#1a1b26,bold"
set -g message-command-style "bg=#565f89,fg=#c0caf5"

# モード設定
set -g mode-style "bg=#7aa2f7,fg=#1a1b26"

# =============================================================================
# その他の設定
# =============================================================================
bind r source-file ~/.config/tmux/tmux.conf \; run '~/.config/tmux/plugins/tpm/tpm' \; display-message "Config reloaded"
bind '?' list-keys

# システムクリップボード連携
bind C-p paste-buffer

# bind e run-shell 'tmux split-window -v -l 20 \
#   -c "#{pane_current_path}" \
#   "editprompt --editor nvim --target-pane #{pane_id}"'

# bind -n M-q run-shell 'tmux split-window -v -l 20 \
#   -c "#{pane_current_path}" \

bind -n M-q run-shell '\
  editprompt resume --target-pane #{pane_id} || \
  tmux split-window -v -l 10 -c "#{pane_current_path}" \
    "editprompt open --editor nvim --always-copy --target-pane #{pane_id}"'

# =============================================================================
# Popup（フローティング窓） - 横幅を必要とする操作（diffview等）向け
# =============================================================================
# popupの外観
set -g popup-border-lines rounded
set -g popup-border-style "fg=#7aa2f7"
set -g popup-style "bg=#1a1b26"

# prefix + g : 現在のpathで全画面popupを開き、nvimでDiffviewOpenを即実行
bind g display-popup -E -w 95% -h 95% -d "#{pane_current_path}" -T " diffview " \
  "nvim -c 'DiffviewOpen'"


# =============================================================================
# TPM (Tmux Plugin Manager) + tmux-agent-sidebar
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'hiroppy/tmux-agent-sidebar'
set -g @sidebar_key O
set -g @sidebar_key_all o
set -g @sidebar_width 26
set -g @sidebar_bottom_height 0
set -g @sidebar_auto_create off

# TPM初期化（この行は必ず設定ファイルの末尾に置く）
run '~/.config/tmux/plugins/tpm/tpm'

