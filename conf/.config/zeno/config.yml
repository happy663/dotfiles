  #   patterns:
  #     - "(^|-- )aws $"
  #     - "(^|-- )aws [a-z0-9-]+ $"
  #     - "(^|-- )aws [a-z0-9-]+ [a-z0-9-]+ $"
  #     - "(^|-- )aws .+ --$"
  #   sourceCommand: 'line="$LBUFFER"; aws_part="${line##*-- }"; COMP_LINE="$aws_part" COMP_POINT=${#aws_part} aws_completer 2>/dev/null'
  #   options:
  #     --prompt: "'AWS CLI> '"
  #     --no-sort: true

history:
  defaultScope: global
  fzfCommand: fzf-tmux
  fzfOptions:
    - "-p 50%,50%"
    - "--exact"
    - "--no-sort"
  redact:
  keymap:
    deleteSoft: ctrl-d
    deleteHard: alt-d
    toggleScope: ctrl-r
    togglePreview: "?"    
