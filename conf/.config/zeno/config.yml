# 参考
# https://github.com/yuki-yano/dotfiles/blob/main/.config/zeno/config.yml
# https://github.com/eetann/dotfiles/blob/main/.config/zeno/config.yml
# https://github.com/mozumasu/dotfiles/tree/main/.config/zeno

snippets:
  - name: zeno preprompt
    keyword: zp
    snippet: zeno-preprompt
  - name: zeno preprompt snippet
    keyword: zps
    snippet: zeno-preprompt-snippet
  - name: git status
    keyword: gs
    snippet: git status --short --branch
  - name: git add
    keyword: ga
    snippet: git add {{file}}
  - name: git add all
    keyword: gaa
    snippet: git add --all
  - name: git commit
    keyword: gci
    snippet: git commit
  - name: git commit message
    keyword: gcim
    snippet: git commit -m '{{commit_message}}'
  - name: git commit fixup
    keyword: gcif
    snippet: git fixup {{commit_id}}
  - name: git diff
    keyword: gd
    snippet: git diff {{branch}}
  - name: git diff file
    keyword: gd
    snippet: git diff -- {{file}}
  - name: git diff branch file
    keyword: gd
    snippet: git diff {{branch}} -- {{file}}
  - name: git diff 2 branch
    keyword: gd
    snippet: git diff {{branch1}} {{branch2}}
  - name: git diff 2 branch file
    keyword: gd
    snippet: git diff {{branch1}} {{branch2}} -- {{file}}
  - name: git diff cached
    keyword: gdc
    snippet: git diff --cached
  - name: git diff cached file
    keyword: gdc
    snippet: git diff --cached -- {{file}}
  - name: git checkout
    keyword: gco
    snippet: git checkout {{branch}}
  - name: git checkout file
    keyword: gcof
    snippet: git checkout -- {{file}}
  - name: git checkout branch file
    keyword: gcof
    snippet: git checkout {{branch}} -- {{file}}
  - name: git checkout track
    keyword: gcot
    snippet: git checkout --track {{origin_branch}}
  - name: git reset
    keyword: gre
    snippet: git reset {{branch}}
  - name: git reset file
    keyword: gre
    snippet: git reset -- {{file}}
  - name: git reset hard
    keyword: gre
    snippet: git reset --hard {{branch}}
  - name: git stash
    keyword: gst
    snippet: git stash
  - name: git stash --include-untracked
    keyword: gstu
    snippet: git stash -u
  - name: git stash list
    keyword: gstl
    snippet: git stash list
  - name: git stash show {{stash}}
    keyword: gsts
    snippet: git stash show {{stash}}
  - name: git stash apply
    keyword: gsta
    snippet: git stash apply {{stash}}
  - name: git stash pop
    keyword: gstp
    snippet: git stash pop {{stash}}
  - name: git stash drop
    keyword: gstd
    snippet: git stash drop {{stash}}
  - name: git rebase squash
    keyword: squash
    snippet: git rebase --interactive --autosquash {{branch}}
  - name: git rebase squash auto
    keyword: squash
    snippet: GIT_EDITOR=cat git rebase --interactive --autosquash {{branch}}
  - name: git rebase conflict resolution
    snippet: git range-diff @{u} @{1} @
  - name: git push
    keyword: gp
    snippet: git push
  - name: git push force-with-lease
    keyword: gpf
    snippet: git push --force-with-lease

  - name: git push safe force
    keyword: -f
    snippet: --force-with-lease
    context:
      lbuffer: '^git push(\s+\S+)*\s+'

  - name: ghq-project-selector
    keyword: f
    snippet: ghq-project-selector

  - name: tmux session selector
    keyword: t
    snippet: tmux-session-manager

  - name: tmux session killer
    keyword: tk
    snippet: tmux-session-manager --kill

  - name: "null"
    keyword: "null"
    snippet: ">/dev/null 2>&1"
    context:
      lbuffer: '.+\s+'
  - name: stdout to null
    keyword: null1
    snippet: ">/dev/null"
    context:
      lbuffer: '.+\s+'
  - name: stderr to null
    keyword: null2
    snippet: "2>/dev/null"
    context:
      lbuffer: '.+\s+'

  - name: pipe vim
    keyword: V
    snippet: "| vi"
    context:
      lbuffer: '.+\s'

  - name: default branch
    keyword: B
    snippet: zsh -c "git symbolic-ref --short refs/remotes/origin/HEAD | sed 's!.*/!!'"
    context:
      lbuffer: '^git\s+'
    evaluate: true

  - name: git quick save
    keyword: c
    snippet: git quick-save "{{message}}"

  - name: nr to ni run
    keyword: nr
    snippet: ni run

  - name: brew
    keyword: b
    snippet: brew

  - name: brew update
    keyword: bu
    snippet: brew update && brew outdated

  - name: brew update
    keyword: bg
    snippet: brew upgrade

  # - name: codex yolo
  #   keyword: yolo
  #   snippet: codex --yolo
  # - name: codex
  #   keyword: co
  #   snippet: codex --yolo
  # - name: claude
  #   keyword: cc
  #   snippet: claude --dangerously-skip-permissions

  - name: codex oneline
    keyword: "?"
    snippet: codex --config model_reasoning_effort="low" exec "{{prompt}}" 2>/dev/null; printf $'\e[<u'; printf $'\e[?2004h'
  - name: CC oneline
    keyword: "??"
    snippet: claude --print --model haiku "{{prompt}}"

  - name: vde-layout
    keyword: vl
    snippet: vde-layout

  - name: difit
    keyword: difit
    snippet: bun x difit@latest .

  - name: disable desktop
    keyword: disable_desktop
    snippet: defaults write com.apple.finder CreateDesktop -boolean false; killall Finder
  - name: enable desktop
    keyword: enable_desktop
    snippet: defaults write com.apple.finder CreateDesktop -boolean true; killall Finder
  - name: relogin
    keyword: r
    snippet: exec $SHELL -l
  - name: docker exec select
    keyword: de
    snippet: docker exec -it $(docker ps | fzf --reverse --height 60% | cut -d " " -f 1) /bin/bash
  - name: github browse
    keyword: ghb
    snippet: gh browse
  - name: nvim
    keyword: n
    snippet: nvim .
  - name: "home-manager switch"
    keyword: "hm"
    snippet: "home-manager switch --flake ~/src/github.com/happy663/dotfiles"
  - name: "which"
    keyword: "w"
    snippet: "which"
  - name: "make docker"
    keyword: "md"
    snippet: "make -f docker.mk"
  - name: ghq list
    keyword: g
    snippet: cd $(ghq root)/$(ghq list | fzf --reverse --height 40%)
  - name: docker compose
    keyword: dc
    snippet: docker compose
  - name: codex terminal nvim
    keyword: ct
    snippet: codexterm

  - name: make link worktree
    keyword: mwt
    snippet: wt=$(git worktree list | fzf --prompt='Worktree> ' | awk '{print $1}') && [ -n "$wt" ] && scripts/link.sh "$wt"

  - name: claude nvim
    keyword: cn
    snippet: claudeNvim

  - name: dual claude
    keyword: cnd
    snippet: dualClaude

  # AWS基本
  # - name: aws-vault exec
  #   keyword: a
  #   snippet: aws-vault exec {{profile}} --

  - name: aws-vault exec default profile
    keyword: a
    snippet: aws-vault exec $AWS_VAULT_DEFAULT_PROFILE --

  - name: aws sts get-caller-identity
    keyword: awho
    snippet: aws-vault exec {{profile}} -- aws sts get-caller-identity

  - name: aws sso login
    keyword: awsso
    snippet: aws sso login

  # ECS操作（aws-vault exec xxx -- の後で展開）
  - name: aws ecs list-clusters
    keyword: ecsl
    snippet: aws ecs list-clusters --query 'clusterArns[]' --output json | jq -r '.[]'
    context:
      lbuffer: 'aws-vault exec \S+ -- \s*'

  - name: aws ecs list-services
    keyword: ecss
    snippet: aws ecs list-services --cluster {{cluster}} --output json | jq -r '.serviceArns[]'
    context:
      lbuffer: 'aws-vault exec \S+ -- \s*'

  - name: aws ecs describe-services
    keyword: ecsd
    snippet: aws ecs describe-services --cluster {{cluster}} --services {{service}} --query 'services[].{Name:serviceName,Status:status,Running:runningCount,Desired:desiredCount,TaskDef:taskDefinition,LaunchType:launchType}' --output table
    context:
      lbuffer: 'aws-vault exec \S+ -- \s*'

  - name: aws ecs list-tags-for-resource
    keyword: ecst
    snippet: aws ecs list-tags-for-resource --resource-arn {{arn}}
    context:
      lbuffer: 'aws-vault exec \S+ -- \s*'

  # EC2（aws-vault exec xxx -- の後で展開）
  - name: aws ec2 describe-instances running
    keyword: ec2r
    snippet: aws ec2 describe-instances --filter 'Name=instance-state-name,Values=running' --query 'Reservations[].Instances[].{ID:InstanceId,Name:Tags[?Key==`Name`].Value|[0],Type:InstanceType,IP:PrivateIpAddress,PublicIP:PublicIpAddress,State:State.Name}' --output table
    context:
      lbuffer: 'aws-vault exec \S+ -- \s*'

  # CloudWatch Logs（aws-vault exec xxx -- の後で展開）
  - name: aws logs groups
    keyword: cwlg
    snippet: aws logs describe-log-groups --query 'logGroups[].{Name:logGroupName,Retention:retentionInDays,Size:storedBytes}' --output table
    context:
      lbuffer: 'aws-vault exec \S+ -- \s*'

  - name: aws logs tail
    keyword: cwlt
    snippet: "aws logs tail "
    context:
      lbuffer: 'aws-vault exec \S+ -- \s*'

  - name: aws logs filter
    keyword: cwlf
    snippet: "aws logs filter-log-events --log-group-name {{log_group}} --filter-pattern '{{pattern}}' --start-time $(( $(date +%s) - 3600 ))000 --limit 100"
    context:
      lbuffer: 'aws-vault exec \S+ -- \s*'

  # S3バージョニング操作（aws-vault exec xxx -- の後で展開）
  - name: aws s3 version list
    keyword: s3ver
    snippet: aws s3api list-object-versions --bucket {{bucket}} --prefix {{key}} --query 'Versions[?LastModified>=`{{from}}`&&LastModified<=`{{to}}`].{VersionId:VersionId,LastModified:LastModified,Size:Size}' --output table
    context:
      lbuffer: 'aws-vault exec \S+ -- \s*'

  - name: aws s3 version get
    keyword: s3get
    snippet: aws s3api get-object --bucket {{bucket}} --key {{key}} --version-id {{version_id}} ./{{output_file}}
    context:
      lbuffer: 'aws-vault exec \S+ -- \s*'

  # - name:
  #   keyword:
  #   snippet:
completions:
  - name: kill
    patterns:
      - "^kill( -9)? $"
    sourceCommand: "procs --color=always"
    options:
      --multi: true
      --prompt: "'Kill Process> '"
      --exact: true
      --header-lines: 2
    callback: "perl -lane 'print $F[0]'"
  - name: git fixup script
    patterns:
      - "^git fixup $"
    sourceCommand: "git log --decorate --color=always --format='%C(green)[commit] %C(magenta)%h%x09%C(yellow)%cr%x09%C(blue)[%an]%x09%C(auto)%s%d' | column -t -s $'\\t'"
    options:
      --prompt: "'Git fixup> '"
      --exact: true
      --no-sort: true
      --preview: "git show --color=always {2}"
    callback: "awk '{print $2}'"
  - name: docker stop
    patterns:
      - "^docker stop $"
    sourceCommand: "docker ps"
    options:
      --header-lines: 1
      --tmux: "80%"
      --prompt: "'Docker Stop> '"
      --no-select-1: true
    callback: "awk '{print $1}'"

  - name: docker rm(コンテナ)
    patterns:
      - "^docker rm $"
    sourceCommand: "docker ps -a"
    options:
      --header-lines: 1
      --tmux: "80%"
      --multi: true
      --prompt: "'Docker Remove Container> '"
      --no-select-1: true
    callback: "awk '{print $1}'"

  - name: docker rmi(イメージ)
    patterns:
      - "^docker rmi $"
    sourceCommand: "docker images"
    options:
      --header-lines: 1
      --tmux: "80%"
      --multi: true
      --prompt: "'Docker Remove Image> '"
      --no-select-1: true
    callback: "awk '{print $3}'"

  - name: nix run apps
    patterns:
      - "^nix run \\.#$"
    sourceCommand: '/nix/var/nix/profiles/default/bin/nix flake show ~/src/github.com/happy663/dotfiles --json 2>/dev/null | jq -r ''.apps["aarch64-darwin"] // {} | keys[]'''
    options:
      --prompt: "'nix run .#> '"

  - name: Makefile
    patterns:
      - "^make $"
    sourceCommand: cat Makefile | awk -F':' '/^[a-zA-Z0-9][^$#\/\t=]*:([^=]|$)/ {split($1,A,/ /);for(i in A)print A[i]}'
    callback: "awk '{printf $1}'"
    options:
      --prompt: "'make> '"

  - name: docker Makefile
    patterns:
      - "^make -f docker.mk( .*)? $"
    sourceCommand: cat docker.mk | awk -F':' '/^[a-zA-Z0-9][^$#\/\t=]*:([^=]|$)/ {split($1,A,/ /);for(i in A)print A[i]}'
    callback: "awk '{printf $1}'"
    options:
      --prompt: "'make> '"

  - name: aws-vault exec profile
    patterns:
      - "^aws-vault exec $"
    sourceCommand: "aws-vault list --profiles"
    options:
      --prompt: "'AWS Profile> '"

  - name: aws ecs cluster select
    patterns:
      - "aws ecs .+ --cluster $"
    sourceCommand: "aws-vault exec $AWS_VAULT_DEFAULT_PROFILE -- aws ecs list-clusters --query 'clusterArns[]' --output text 2>/dev/null | tr '\\t' '\\n' | xargs -I{} basename {}"
    options:
      --prompt: "'ECS Cluster> '"

  - name: aws ecs service select
    patterns:
      - "aws ecs .+ --cluster (\\S+) --services $"
    sourceCommand: "cluster=$(echo $LBUFFER | grep -oE '\\-\\-cluster [^ ]+' | awk '{print $2}'); aws-vault exec $AWS_VAULT_DEFAULT_PROFILE -- aws ecs list-services --cluster $cluster --query 'serviceArns[]' --output text 2>/dev/null | tr '\\t' '\\n' | xargs -I{} basename {}"
    options:
      --prompt: "'ECS Service> '"

  - name: aws logs log-group select
    patterns:
      - "aws logs filter-log-events --log-group-name $"
      - "aws logs tail $"
    sourceCommand: "profile=$(echo $LBUFFER | grep -oE 'aws-vault exec [^ ]+' | awk '{print $3}'); aws-vault exec $profile -- aws logs describe-log-groups --query 'logGroups[].logGroupName' --output text 2>/dev/null | tr '\\t' '\\n'"
    options:
      --prompt: "'Log Group> '"

  - name: aws s3 bucket select
    patterns:
      - "aws s3api .+ --bucket $"
    sourceCommand: "profile=$(echo $LBUFFER | grep -oE 'aws-vault exec [^ ]+' | awk '{print $3}'); aws-vault exec $profile -- aws s3api list-buckets --query 'Buckets[].Name' --output text 2>/dev/null | tr '\\t' '\\n'"
    options:
      --prompt: "'S3 Bucket> '"

  - name: aws s3 key select
    patterns:
      - "aws s3api .+ --prefix $"
      - "aws s3api .+ --key $"
    sourceCommand: "profile=$(echo $LBUFFER | grep -oE 'aws-vault exec [^ ]+' | awk '{print $3}'); bucket=$(echo $LBUFFER | grep -oE '\\-\\-bucket [^ ]+' | awk '{print $2}'); aws-vault exec $profile -- aws s3api list-objects-v2 --bucket $bucket --query 'Contents[].Key' --output text 2>/dev/null | tr '\\t' '\\n'"
    options:
      --prompt: "'S3 Key> '"

  - name: aws s3 version-id select
    patterns:
      - "aws s3api get-object .+ --version-id $"
    sourceCommand: "profile=$(echo $LBUFFER | grep -oE 'aws-vault exec [^ ]+' | awk '{print $3}'); bucket=$(echo $LBUFFER | grep -oE '\\-\\-bucket [^ ]+' | awk '{print $2}'); key=$(echo $LBUFFER | grep -oE '\\-\\-key [^ ]+' | awk '{print $2}'); aws-vault exec $profile -- aws s3api list-object-versions --bucket $bucket --prefix $key --query 'Versions[].{id:VersionId,date:LastModified,size:Size}' --output text 2>/dev/null | sort -k1 -r"
    options:
      --prompt: "'S3 Version> '"
      --no-sort: true
    callback: "awk '{print $2}'"

  # AWS CLI公式の汎用補完（サービス名・サブコマンド・オプション）
  # 値の動的補完（--cluster等）や既存スニペット（ecsd等）とは発火条件が異なるため競合しない
  # aws-vault exec <profile> -- aws ... 形式でも素の aws ... 形式でも動作する
